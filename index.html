<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NR-01 - Questionário 1</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="form-card">
      <div class="header">
        <h1>Questionário de Riscos Psicossociais</h1>
      </div>

      <form id="form">
        <div class="question-item">
          <label class="question-label">A carga de trabalho que você enfrenta no seu dia-a-dia é excessiva?</label>
          <select name="risco1" required>
            <option value="">Selecione</option>
            <option value="1">Nunca</option>
            <option value="2">Raramente</option>
            <option value="3">Às vezes</option>
            <option value="4">Frequentemente</option>
            <option value="5">Sempre</option>
          </select>
        </div>

        <div class="question-item">
          <label class="question-label">Você sente que tem autonomia suficiente para tomar decisões no seu trabalho?</label>
          <select name="risco2" required>
            <option value="">Selecione</option>
            <option value="1">Nunca</option>
            <option value="2">Raramente</option>
            <option value="3">Às vezes</option>
            <option value="4">Frequentemente</option>
            <option value="5">Sempre</option>
          </select>
        </div>

        <div class="question-item">
          <label class="question-label">Você sente que pode contar com os colegas e supervisores quando precisa de apoio?</label>
          <select name="risco3" required>
            <option value="">Selecione</option>
            <option value="1">Nunca</option>
            <option value="2">Raramente</option>
            <option value="3">Às vezes</option>
            <option value="4">Frequentemente</option>
            <option value="5">Sempre</option>
          </select>
        </div>

        <div class="question-item">
          <label class="question-label">Existe um clima de respeito e colaboração entre você e seus colegas de trabalho?</label>
          <select name="risco4" required>
            <option value="">Selecione</option>
            <option value="1">Nunca</option>
            <option value="2">Raramente</option>
            <option value="3">Às vezes</option>
            <option value="4">Frequentemente</option>
            <option value="5">Sempre</option>
          </select>
        </div>

        <div class="question-item">
          <label class="question-label">Você sente que seu esforço e desempenho são reconhecidos adequadamente?</label>
          <select name="risco5" required>
            <option value="">Selecione</option>
            <option value="1">Nunca</option>
            <option value="2">Raramente</option>
            <option value="3">Às vezes</option>
            <option value="4">Frequentemente</option>
            <option value="5">Sempre</option>
          </select>
        </div>

        <button type="submit" class="btn-submit">Enviar</button>
      </form>

      <div class="footer">
        NR-01 - Disposições Gerais e Gerenciamento de Riscos Ocupacionais
      </div>
    </div>
  </div>

  <script>
    const url = "https://script.google.com/macros/s/AKfycbwzlx8_bBPt6YuaK7kTl8-i3ui4nvr9pf6e4ERlEEYP1yoQkSWQQKhEDxnkISsP7TfC/exec";

    document.getElementById("form").addEventListener("submit", async function(e) {
      e.preventDefault();

      const formData = new FormData(this);
      const data = Object.fromEntries(formData.entries());

      const valores = [data.risco1, data.risco2, data.risco3, data.risco4, data.risco5];
      if (valores.some(v => !v)) {
        showAlert("Preencha todos os campos", "error");
        return;
      }

      const total =
        Number(data.risco1) +
        Number(data.risco2) +
        Number(data.risco3) +
        Number(data.risco4) +
        Number(data.risco5);

      data.total = total;

      const submitBtn = document.querySelector('.btn-submit');
      const originalText = submitBtn.textContent;
      submitBtn.textContent = "Enviando...";
      submitBtn.disabled = true;

      try {
        await fetch(url, {
          method: "POST",
          mode: "no-cors",
          body: JSON.stringify(data)
        });

        showAlert("Enviado com sucesso", "success");
        this.reset();

      } catch (error) {
        showAlert("Erro ao enviar", "error");
      } finally {
        submitBtn.textContent = originalText;
        submitBtn.disabled = false;
      }
    });

    function showAlert(message, type) {
      const existingAlert = document.querySelector('.alert');
      if (existingAlert) existingAlert.remove();

      const alertDiv = document.createElement('div');
      alertDiv.className = `alert alert-${type}`;
      alertDiv.textContent = message;
      document.body.appendChild(alertDiv);

      setTimeout(() => alertDiv.remove(), 3000);
    }
  </script>
</body>
</html>
